version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agrifarmeet-fe
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # Mount source code for hot reload
      - .:/app
      - /app/node_modules
    networks:
      - agrifarmeet-network

networks:
  agrifarmeet-network:
    driver: bridge

