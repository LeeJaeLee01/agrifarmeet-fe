<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <!-- Tránh lỗi "Can't find variable: zaloJSV2" từ script bên ngoài (GTM/hosting). Nếu không dùng Zalo OA có thể bỏ. -->
    <script>window.zaloJSV2 = window.zaloJSV2 || null;</script>
    <!-- Favicon - Đầy đủ các kích thước cho tất cả trình duyệt và thiết bị -->
    <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="%PUBLIC_URL%/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="%PUBLIC_URL%/android-chrome-512x512.png"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3da35d" />

    <!-- SEO cơ bản -->
    <meta
      name="description"
      content="Farme - Nền tảng kết nối nông dân và người tiêu dùng, cung cấp nông sản sạch với quy trình minh bạch, an toàn và bền vững."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://farme.vn/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://farme.vn/" />
    <meta property="og:title" content="Farme - Nông sản sạch, minh bạch, an toàn, bền vững" />
    <meta property="og:image" content="https://farme.vn/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Farme Logo" />
    <meta
      property="og:description"
      content="Tươi ngon từ nông trại. Chúng tôi giao những nông sản tươi ngon nhất của mùa và các sản phẩm nông trại lành mạnh đến tận cửa nhà bạn."
    />
    <meta property="og:site_name" content="Farme" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://farme.vn/" />
    <meta
      name="twitter:title"
      content="Farme - Nông sản sạch, minh bạch, an toàn, bền vững"
    />
    <meta name="twitter:image" content="https://farme.vn/logo.png" />
    <meta name="twitter:image:alt" content="Farme Logo" />
    <meta
      name="twitter:description"
      content="Tươi ngon từ nông trại. Chúng tôi giao những nông sản tươi ngon nhất của mùa và các sản phẩm nông trại lành mạnh đến tận cửa nhà bạn."
    />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/site.webmanifest" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Farme - Nông sản sạch, minh bạch, an toàn, bền vững</title>
  </head>
